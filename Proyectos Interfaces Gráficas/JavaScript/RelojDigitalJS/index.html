<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reloj Digital Premium</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Fondo animado con partículas */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Contenedor principal */
        .clock-container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px 60px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform: perspective(1000px) rotateX(5deg);
            transition: transform 0.3s ease;
        }

        .clock-container:hover {
            transform: perspective(1000px) rotateX(0deg) scale(1.02);
        }

        /* Fecha */
        .date-display {
            color: #a0a0a0;
            font-size: 1.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 20px;
            font-weight: 300;
        }

        /* Reloj principal */
        .clock-display {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }

        .time {
            font-size: 6rem;
            font-weight: 200;
            color: #ffffff;
            text-shadow: 
                0 0 20px rgba(0, 255, 255, 0.5),
                0 0 40px rgba(0, 255, 255, 0.3),
                0 0 60px rgba(0, 255, 255, 0.1);
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 
                    0 0 20px rgba(0, 255, 255, 0.5),
                    0 0 40px rgba(0, 255, 255, 0.3),
                    0 0 60px rgba(0, 255, 255, 0.1);
            }
            to {
                text-shadow: 
                    0 0 30px rgba(0, 255, 255, 0.8),
                    0 0 60px rgba(0, 255, 255, 0.5),
                    0 0 90px rgba(0, 255, 255, 0.3);
            }
        }

        .separator {
            font-size: 4rem;
            color: #00ffff;
            animation: blink 1s infinite;
            font-weight: 100;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .ampm {
            font-size: 1.5rem;
            color: #00ffff;
            font-weight: 400;
            margin-left: 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .ampm.visible {
            opacity: 1;
        }

        /* Segundos */
        .seconds-display {
            font-size: 2rem;
            color: #ff6b6b;
            font-weight: 300;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        /* Controles */
        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .toggle-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
        }

        .toggle-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .toggle-btn:hover::before {
            left: 100%;
        }

        .toggle-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .toggle-btn:active {
            transform: translateY(0);
        }

        .toggle-btn.active {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }

        /* Barra de progreso del día */
        .day-progress {
            margin-top: 30px;
            width: 100%;
        }

        .progress-label {
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ffff, #ff6b6b);
            border-radius: 3px;
            transition: width 1s linear;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        /* Zona horaria */
        .timezone {
            margin-top: 20px;
            color: #666;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .clock-container {
                padding: 30px 20px;
                margin: 20px;
            }

            .time {
                font-size: 3.5rem;
            }

            .separator {
                font-size: 2.5rem;
            }

            .seconds-display {
                font-size: 1.5rem;
            }

            .toggle-btn {
                padding: 10px 18px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- Partículas de fondo -->
    <div class="particles" id="particles"></div>

    <!-- Contenedor del reloj -->
    <div class="clock-container">
        <div class="date-display" id="dateDisplay">Cargando...</div>
        
        <div class="clock-display">
            <span class="time" id="hours">00</span>
            <span class="separator">:</span>
            <span class="time" id="minutes">00</span>
            <span class="ampm" id="ampm">AM</span>
        </div>
        
        <div class="seconds-display">
            <span id="seconds">00</span> segundos
        </div>

        <div class="controls">
            <button class="toggle-btn" id="formatToggle" onclick="toggleFormat()">
                Cambiar a 12H
            </button>
            <button class="toggle-btn" id="secondsToggle" onclick="toggleSeconds()">
                Ocultar Segundos
            </button>
            <button class="toggle-btn" id="fullscreenToggle" onclick="toggleFullscreen()">
                Pantalla Completa
            </button>
        </div>

        <div class="day-progress">
            <div class="progress-label">Progreso del día</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
        </div>

        <div class="timezone" id="timezone">Detectando zona horaria...</div>
    </div>

    <script>
        // Estado de la aplicación
        let is24Hour = true;
        let showSeconds = true;
        let isFullscreen = false;

        // Crear partículas de fondo
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(particle);
            }
        }

        // Actualizar el reloj
        function updateClock() {
            const now = new Date();
            
            // Obtener componentes de tiempo
            let hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            
            // Manejar formato 12/24 horas
            let ampm = '';
            if (!is24Hour) {
                ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12;
                hours = hours ? hours : 12; // 0 debe ser 12
            }
            
            // Formatear con ceros a la izquierda
            const hoursStr = hours.toString().padStart(2, '0');
            const minutesStr = minutes.toString().padStart(2, '0');
            const secondsStr = seconds.toString().padStart(2, '0');
            
            // Actualizar DOM
            document.getElementById('hours').textContent = hoursStr;
            document.getElementById('minutes').textContent = minutesStr;
            document.getElementById('seconds').textContent = secondsStr;
            
            // Actualizar AM/PM
            const ampmElement = document.getElementById('ampm');
            if (!is24Hour) {
                ampmElement.textContent = ampm;
                ampmElement.classList.add('visible');
            } else {
                ampmElement.classList.remove('visible');
            }
            
            // Actualizar fecha
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            };
            const dateStr = now.toLocaleDateString('es-ES', options);
            document.getElementById('dateDisplay').textContent = dateStr;
            
            // Actualizar zona horaria
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const offset = -now.getTimezoneOffset() / 60;
            const offsetStr = offset >= 0 ? `+${offset}` : offset;
            document.getElementById('timezone').textContent = `${timezone} (UTC${offsetStr})`;
            
            // Actualizar progreso del día
            const totalSeconds = hours * 3600 + minutes * 60 + seconds;
            const dayProgress = (totalSeconds / 86400) * 100;
            document.getElementById('progressFill').style.width = dayProgress + '%';
        }

        // Cambiar formato de hora
        function toggleFormat() {
            is24Hour = !is24Hour;
            const btn = document.getElementById('formatToggle');
            btn.textContent = is24Hour ? 'Cambiar a 12H' : 'Cambiar a 24H';
            btn.classList.toggle('active', !is24Hour);
            updateClock();
        }

        // Mostrar/ocultar segundos
        function toggleSeconds() {
            showSeconds = !showSeconds;
            const secondsDisplay = document.querySelector('.seconds-display');
            const btn = document.getElementById('secondsToggle');
            
            if (showSeconds) {
                secondsDisplay.style.display = 'block';
                btn.textContent = 'Ocultar Segundos';
                btn.classList.remove('active');
            } else {
                secondsDisplay.style.display = 'none';
                btn.textContent = 'Mostrar Segundos';
                btn.classList.add('active');
            }
        }

        // Pantalla completa
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Error al entrar en pantalla completa:', err);
                });
                isFullscreen = true;
            } else {
                document.exitFullscreen();
                isFullscreen = false;
            }
            
            const btn = document.getElementById('fullscreenToggle');
            btn.textContent = isFullscreen ? 'Salir Pantalla Completa' : 'Pantalla Completa';
            btn.classList.toggle('active', isFullscreen);
        }

        // Detectar cambio de pantalla completa
        document.addEventListener('fullscreenchange', () => {
            isFullscreen = !!document.fullscreenElement;
            const btn = document.getElementById('fullscreenToggle');
            btn.textContent = isFullscreen ? 'Salir Pantalla Completa' : 'Pantalla Completa';
            btn.classList.toggle('active', isFullscreen);
        });

        // Inicializar
        createParticles();
        updateClock();
        setInterval(updateClock, 1000);

        // Efecto de parallax en mouse move
        document.addEventListener('mousemove', (e) => {
            const container = document.querySelector('.clock-container');
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            container.style.transform = `perspective(1000px) rotateX(${y}deg) rotateY(${-x}deg)`;
        });
    </script>
</body>
</html>
