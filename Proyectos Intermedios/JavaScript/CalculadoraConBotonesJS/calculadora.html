<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Premium</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #1e3c72 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        /* Contenedor principal */
        .calculator-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
            width: 100%;
        }

        /* Pantalla */
        .display {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: right;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .previous-operation {
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.2rem;
            min-height: 30px;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .current-operation {
            color: #ffffff;
            font-size: 2.8rem;
            font-weight: 300;
            word-wrap: break-word;
            overflow-wrap: break-word;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        /* Grid de botones */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        /* Estilos base de botones */
        .btn {
            border: none;
            border-radius: 20px;
            font-size: 1.5rem;
            padding: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }

        .btn:active::before {
            width: 200px;
            height: 200px;
        }

        /* Botones numéricos */
        .btn-number {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-number:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        /* Botones de operación */
        .btn-operator {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(238, 90, 111, 0.4);
        }

        .btn-operator:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(238, 90, 111, 0.6);
        }

        .btn-operator.active {
            background: linear-gradient(135deg, #ffd93d 0%, #ff6b6f 100%);
            box-shadow: 0 0 20px rgba(255, 217, 61, 0.6);
        }

        /* Botón igual */
        .btn-equal {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            grid-column: span 2;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
        }

        .btn-equal:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 172, 254, 0.6);
        }

        /* Botón clear */
        .btn-clear {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }

        .btn-clear:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(250, 112, 154, 0.6);
        }

        /* Botón borrar */
        .btn-delete {
            background: rgba(255, 255, 255, 0.15);
            color: #ff6b6b;
            font-size: 1.3rem;
        }

        .btn-delete:hover {
            background: rgba(255, 107, 107, 0.2);
            transform: translateY(-2px);
        }

        /* Botón cero (doble ancho) */
        .btn-zero {
            grid-column: span 2;
        }

        /* Historial */
        .history-container {
            margin-top: 20px;
            max-height: 150px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 15px;
        }

        .history-title {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .history-item {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-item:hover {
            color: #4facfe;
            padding-left: 10px;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        /* Scrollbar personalizado */
        .history-container::-webkit-scrollbar {
            width: 6px;
        }

        .history-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .history-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .calculator-container {
                padding: 20px;
            }

            .btn {
                padding: 20px;
                font-size: 1.3rem;
            }

            .current-operation {
                font-size: 2.2rem;
            }

            .buttons-grid {
                gap: 10px;
            }
        }

        /* Animación de error */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .error {
            animation: shake 0.5s ease-in-out;
            color: #ff6b6b !important;
        }

        /* Título */
        .calculator-title {
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 20px;
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="calculator-container">
        <h1 class="calculator-title">Calculadora</h1>
        
        <!-- Pantalla -->
        <div class="display">
            <div class="previous-operation" id="previousOperation"></div>
            <div class="current-operation" id="currentOperation">0</div>
        </div>

        <!-- Botones -->
        <div class="buttons-grid">
            <button class="btn btn-clear" onclick="clearAll()">AC</button>
            <button class="btn btn-delete" onclick="deleteLast()">⌫</button>
            <button class="btn btn-operator" onclick="chooseOperation('%')">%</button>
            <button class="btn btn-operator" onclick="chooseOperation('/')">÷</button>

            <button class="btn btn-number" onclick="appendNumber('7')">7</button>
            <button class="btn btn-number" onclick="appendNumber('8')">8</button>
            <button class="btn btn-number" onclick="appendNumber('9')">9</button>
            <button class="btn btn-operator" onclick="chooseOperation('*')">×</button>

            <button class="btn btn-number" onclick="appendNumber('4')">4</button>
            <button class="btn btn-number" onclick="appendNumber('5')">5</button>
            <button class="btn btn-number" onclick="appendNumber('6')">6</button>
            <button class="btn btn-operator" onclick="chooseOperation('-')">−</button>

            <button class="btn btn-number" onclick="appendNumber('1')">1</button>
            <button class="btn btn-number" onclick="appendNumber('2')">2</button>
            <button class="btn btn-number" onclick="appendNumber('3')">3</button>
            <button class="btn btn-operator" onclick="chooseOperation('+')">+</button>

            <button class="btn btn-number btn-zero" onclick="appendNumber('0')">0</button>
            <button class="btn btn-number" onclick="appendNumber('.')">.</button>
            <button class="btn btn-equal" onclick="calculate()">=</button>
        </div>

        <!-- Historial -->
        <div class="history-container" id="historyContainer" style="display: none;">
            <div class="history-title">Historial</div>
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        // Variables de estado
        let currentOperand = '0';
        let previousOperand = '';
        let operation = undefined;
        let shouldResetScreen = false;
        let history = [];

        // Elementos del DOM
        const currentOperationElement = document.getElementById('currentOperation');
        const previousOperationElement = document.getElementById('previousOperation');
        const historyContainer = document.getElementById('historyContainer');
        const historyList = document.getElementById('historyList');

        // Agregar número
        function appendNumber(number) {
            if (shouldResetScreen) {
                currentOperand = '';
                shouldResetScreen = false;
            }

            // Evitar múltiples puntos decimales
            if (number === '.' && currentOperand.includes('.')) return;

            // Evitar múltiples ceros al inicio
            if (number === '0' && currentOperand === '0') return;

            // Reemplazar el cero inicial
            if (currentOperand === '0' && number !== '.') {
                currentOperand = number;
            } else {
                currentOperand += number;
            }

            updateDisplay();
        }

        // Elegir operación
        function chooseOperation(op) {
            if (currentOperand === '') return;
            
            if (previousOperand !== '') {
                calculate();
            }

            operation = op;
            previousOperand = currentOperand;
            currentOperand = '';
            shouldResetScreen = true;

            // Actualizar visualización de operación activa
            updateDisplay();
            highlightOperator(op);
        }

        // Calcular resultado
        function calculate() {
            let computation;
            const prev = parseFloat(previousOperand);
            const current = parseFloat(currentOperand);

            if (isNaN(prev) || isNaN(current)) return;

            switch (operation) {
                case '+':
                    computation = prev + current;
                    break;
                case '-':
                    computation = prev - current;
                    break;
                case '*':
                    computation = prev * current;
                    break;
                case '/':
                    if (current === 0) {
                        showError();
                        return;
                    }
                    computation = prev / current;
                    break;
                case '%':
                    computation = prev % current;
                    break;
                default:
                    return;
            }

            // Redondear para evitar problemas de punto flotante
            computation = Math.round(computation * 100000000) / 100000000;

            // Guardar en historial
            addToHistory(prev, operation, current, computation);

            currentOperand = computation.toString();
            operation = undefined;
            previousOperand = '';
            shouldResetScreen = true;

            updateDisplay();
            removeHighlight();
        }

        // Limpiar todo
        function clearAll() {
            currentOperand = '0';
            previousOperand = '';
            operation = undefined;
            shouldResetScreen = false;
            updateDisplay();
            removeHighlight();
        }

        // Borrar último carácter
        function deleteLast() {
            if (currentOperand.length === 1 || 
                (currentOperand.length === 2 && currentOperand[0] === '-')) {
                currentOperand = '0';
            } else {
                currentOperand = currentOperand.slice(0, -1);
            }
            updateDisplay();
        }

        // Actualizar pantalla
        function updateDisplay() {
            currentOperationElement.textContent = formatNumber(currentOperand);
            
            if (operation != null) {
                const opSymbol = getOperationSymbol(operation);
                previousOperationElement.textContent = `${formatNumber(previousOperand)} ${opSymbol}`;
            } else {
                previousOperationElement.textContent = '';
            }
        }

        // Formatear número con separadores de miles
        function formatNumber(number) {
            if (number === '') return '';
            const stringNumber = number.toString();
            const integerDigits = parseFloat(stringNumber.split('.')[0]);
            const decimalDigits = stringNumber.split('.')[1];
            let integerDisplay;
            
            if (isNaN(integerDigits)) {
                integerDisplay = '';
            } else {
                integerDisplay = integerDigits.toLocaleString('es-ES', {
                    maximumFractionDigits: 0
                });
            }

            if (decimalDigits != null) {
                return `${integerDisplay}.${decimalDigits}`;
            } else {
                return integerDisplay;
            }
        }

        // Obtener símbolo de operación
        function getOperationSymbol(op) {
            const symbols = {
                '+': '+',
                '-': '−',
                '*': '×',
                '/': '÷',
                '%': '%'
            };
            return symbols[op] || op;
        }

        // Mostrar error
        function showError() {
            currentOperand = 'Error';
            currentOperationElement.classList.add('error');
            setTimeout(() => {
                currentOperationElement.classList.remove('error');
                clearAll();
            }, 1500);
            updateDisplay();
        }

        // Resaltar operador activo
        function highlightOperator(op) {
            removeHighlight();
            const buttons = document.querySelectorAll('.btn-operator');
            buttons.forEach(btn => {
                if (btn.textContent === getOperationSymbol(op)) {
                    btn.classList.add('active');
                }
            });
        }

        // Remover resaltado
        function removeHighlight() {
            document.querySelectorAll('.btn-operator').forEach(btn => {
                btn.classList.remove('active');
            });
        }

        // Agregar al historial
        function addToHistory(prev, op, current, result) {
            const historyItem = {
                operation: `${formatNumber(prev)} ${getOperationSymbol(op)} ${formatNumber(current)}`,
                result: formatNumber(result)
            };
            
            history.unshift(historyItem);
            if (history.length > 10) history.pop();
            
            updateHistoryDisplay();
        }

        // Actualizar visualización del historial
        function updateHistoryDisplay() {
            if (history.length === 0) {
                historyContainer.style.display = 'none';
                return;
            }

            historyContainer.style.display = 'block';
            historyList.innerHTML = history.map((item, index) => `
                <div class="history-item" onclick="useHistoryResult(${index})">
                    ${item.operation} = ${item.result}
                </div>
            `).join('');
        }

        // Usar resultado del historial
        function useHistoryResult(index) {
            const result = history[index].result.replace(/\./g, '').replace(',', '.');
            currentOperand = result;
            shouldResetScreen = true;
            updateDisplay();
        }

        // Soporte para teclado
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
            if (e.key === '.') appendNumber('.');
            if (e.key === '+') chooseOperation('+');
            if (e.key === '-') chooseOperation('-');
            if (e.key === '*') chooseOperation('*');
            if (e.key === '/') {
                e.preventDefault();
                chooseOperation('/');
            }
            if (e.key === '%') chooseOperation('%');
            if (e.key === 'Enter' || e.key === '=') calculate();
            if (e.key === 'Escape') clearAll();
            if (e.key === 'Backspace') deleteLast();
        });

        // Inicializar
        updateDisplay();
    </script>
</body>
</html>
